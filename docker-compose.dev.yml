services:
  interprep-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STREAM_API_KEY: ${NEXT_PUBLIC_STREAM_API_KEY}
    stdin_open: true
    tty: true
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STREAM_API_KEY: ${NEXT_PUBLIC_STREAM_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      STREAM_SECRET_KEY: ${STREAM_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      CONVEX_DEPLOYMENT: ${CONVEX_DEPLOYMENT}
      JUDGE0_URL: ${JUDGE0_URL:-http://localhost:2358}
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
    ports:
      - "3000:3000"
      - "4000:4000"
    volumes:
      - .:/app
      - interprep-node-modules:/app/node_modules
    working_dir: /app
    command: >
      sh -c "npx convex dev & npm run dev"
    restart: unless-stopped

volumes:
  interprep-node-modules: